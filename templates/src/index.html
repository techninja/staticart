<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Store — Powered by StatiCart</title>
    <meta
      name="description"
      content="An e-commerce store powered by StatiCart."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="preload" href="/vendor/hybrids/index.js" as="script" crossorigin />
    <link rel="stylesheet" href="/vendor/staticart/styles/staticart.css" />
    <link rel="stylesheet" href="/styles/tokens.css" />

    <script type="importmap">
      {
        "imports": {
          "hybrids": "/vendor/hybrids/index.js",
          "#store/": "/vendor/staticart/store/",
          "#utils/": "/vendor/staticart/utils/",
          "#atoms/": "/vendor/staticart/components/atoms/",
          "#molecules/": "/vendor/staticart/components/molecules/",
          "#organisms/": "/vendor/staticart/components/organisms/",
          "#pages/": "/vendor/staticart/pages/",
          "#staticart/": "/vendor/staticart/"
        }
      }
    </script>
  </head>
  <body>
    <script>
      // Capture Stripe session ID before the SPA router strips query params
      const sid = new URLSearchParams(location.search).get('session_id');
      if (sid) sessionStorage.setItem('stripe_session_id', sid);
    </script>
    <app-router></app-router>
    <script type="module" src="/vendor/staticart/router/index.js"></script>
  </body>
</html>
