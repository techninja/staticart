<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StatiCart — Static E-Commerce</title>
    <meta
      name="description"
      content="A full-featured e-commerce platform built 99% on static hosting."
    />
    <link rel="preload" href="/styles/reset.css" as="style" />
    <link rel="preload" href="/styles/tokens.css" as="style" />
    <link rel="preload" href="/vendor/hybrids/index.js" as="script" crossorigin />
    <link rel="stylesheet" href="/styles/reset.css" />
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/shared.css" />
    <link rel="stylesheet" href="/styles/buttons.css" />
    <link rel="stylesheet" href="/styles/forms.css" />
    <link rel="stylesheet" href="/styles/components.css" />
    <link rel="stylesheet" href="/styles/pages.css" />
    <link rel="stylesheet" href="/styles/pages-cart.css" />

    <script type="importmap">
      {
        "imports": {
          "hybrids": "/vendor/hybrids/index.js",
          "#store/": "/store/",
          "#utils/": "/utils/",
          "#atoms/": "/components/atoms/",
          "#molecules/": "/components/molecules/",
          "#organisms/": "/components/organisms/",
          "#templates/": "/components/templates/",
          "#pages/": "/pages/"
        }
      }
    </script>
  </head>
  <body>
    <script>
      // Capture Stripe session ID before the SPA router strips query params
      const sid = new URLSearchParams(location.search).get('session_id');
      if (sid) sessionStorage.setItem('stripe_session_id', sid);
    </script>
    <app-router></app-router>
    <script type="module" src="/router/index.js"></script>
  </body>
</html>
